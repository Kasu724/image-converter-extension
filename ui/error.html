<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Conversion Failed</title>
    <link rel="stylesheet" href="error.css">
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Conversion failed</p>
      <h1>That image could not be converted.</h1>
      <p id="message" class="message"></p>

      <dl>
        <div>
          <dt>Error code</dt>
          <dd id="code"></dd>
        </div>
        <div>
          <dt>Target</dt>
          <dd id="target"></dd>
        </div>
        <div>
          <dt>Source format</dt>
          <dd id="source-format"></dd>
        </div>
        <div>
          <dt>Source</dt>
          <dd id="source-url"></dd>
        </div>
      </dl>

      <p class="hint">
        Try opening the image in its own tab, then run the conversion again. Some sites block image reuse,
        and very large images may exceed browser canvas limits.
      </p>

      <div class="actions">
        <button id="open-options" type="button">Open settings</button>
        <button id="close-page" type="button">Close</button>
      </div>
    </main>

    <script type="module" src="error.js"></script>
  </body>
</html>
